    <text x="181" y="12" font-family="JetBrains Mono,monospace" font-size="8" fill="rgba(196,0,255,0.9)"  text-anchor="middle">🔐 Cybersecurity</text>

    <!-- AI/ML pill -->
    <rect x="234" y="0" width="56"  height="18" rx="9" fill="rgba(255,45,120,0.12)" stroke="rgba(255,45,120,0.4)" stroke-width="1"/>
    <text x="262" y="12" font-family="JetBrains Mono,monospace" font-size="8" fill="rgba(255,45,120,0.9)" text-anchor="middle">🤖 AI/ML</text>
  </g>

  <!-- ══════════════════════════════
       FLOATING DATA STREAMS
  ══════════════════════════════ -->
  <g font-family="JetBrains Mono,monospace" font-size="9" opacity="0.18" fill="#C400FF">
    <text x="230" y="55">01001101</text>
    <text x="230" y="68">11010010</text>
    <text x="230" y="81">00110101</text>
    <text x="230" y="270">01101001</text>
