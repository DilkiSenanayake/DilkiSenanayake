<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000008"/>
      <stop offset="35%" style="stop-color:#08001A"/>
      <stop offset="70%" style="stop-color:#0F0020"/>
      <stop offset="100%" style="stop-color:#03000E"/>
    </linearGradient>

    <linearGradient id="neon-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="20%" style="stop-color:#C400FF"/>
      <stop offset="50%" style="stop-color:#FF2D78"/>
      <stop offset="80%" style="stop-color:#C400FF"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>

    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="35%" style="stop-color:#F0AAFF"/>
      <stop offset="65%" style="stop-color:#FF88CC"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>

    <linearGradient id="scanline-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:rgba(196,0,255,0.04)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>

    <!-- Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(196,0,255,0.07)" stroke-width="0.5"/>
    </pattern>

    <!-- Fine grid -->
    <pattern id="finegrid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(196,0,255,0.03)" stroke-width="0.3"/>
    </pattern>

    <!-- Glows -->
    <filter id="glow-v" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pk" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-name" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-hard" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BASE ── -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#finegrid)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- ── SCANLINES ── -->
  <rect width="1200" height="320" fill="url(#scanline-grad)" opacity="0.5"/>

  <!-- ── RADIAL GLOWS (background atmosphere) ── -->
  <ellipse cx="600" cy="160" rx="500" ry="180" fill="rgba(196,0,255,0.04)"/>
  <ellipse cx="200" cy="160" rx="200" ry="160" fill="rgba(123,0,255,0.05)"/>
  <ellipse cx="1000" cy="160" rx="220" ry="160" fill="rgba(255,45,120,0.04)"/>
  <ellipse cx="600" cy="320" rx="350" ry="80" fill="rgba(196,0,255,0.07)"/>

  <!-- ══════════════════════════════
       LEFT PANEL — CIRCUIT BOARD
  ══════════════════════════════ -->
  <g filter="url(#glow-sm)">
    <!-- Main circuit trunk -->
    <path d="M 0 100 L 80 100 L 100 120 L 180 120" stroke="#C400FF" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M 0 160 L 60 160 L 80 140 L 200 140" stroke="#C400FF" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 0 220 L 90 220 L 110 200 L 190 200" stroke="#FF2D78" stroke-width="1.2" fill="none" opacity="0.6"/>
    <path d="M 0 260 L 50 260 L 70 240 L 130 240" stroke="#C400FF" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M 0 80 L 40 80 L 60 60 L 100 60" stroke="#FF2D78" stroke-width="0.8" fill="none" opacity="0.35"/>

    <!-- Branch lines -->
    <path d="M 100 120 L 100 160 L 140 160 L 140 200" stroke="#C400FF" stroke-width="0.7" fill="none" opacity="0.4"/>
    <path d="M 140 140 L 140 120 L 170 120" stroke="#FF2D78" stroke-width="0.7" fill="none" opacity="0.35"/>
    <path d="M 80 100 L 80 80 L 120 80" stroke="#7B00FF" stroke-width="0.7" fill="none" opacity="0.4"/>

    <!-- Circuit nodes -->
    <circle cx="180" cy="120" r="4" fill="#C400FF" opacity="0.9"/>
    <circle cx="200" cy="140" r="3" fill="#FF2D78" opacity="0.8"/>
    <circle cx="190" cy="200" r="4" fill="#C400FF" opacity="0.7"/>
    <circle cx="130" cy="240" r="3" fill="#FF2D78" opacity="0.6"/>
    <circle cx="100" cy="60"  r="3" fill="#7B00FF" opacity="0.7"/>
    <circle cx="140" cy="160" r="3" fill="#C400FF" opacity="0.5"/>
    <circle cx="140" cy="200" r="2.5" fill="#FF2D78" opacity="0.5"/>

    <!-- Node rings -->
    <circle cx="180" cy="120" r="8" fill="none" stroke="#C400FF" stroke-width="0.8" opacity="0.4"/>
    <circle cx="190" cy="200" r="8" fill="none" stroke="#C400FF" stroke-width="0.8" opacity="0.35"/>
  </g>

  <!-- LEFT MINI TERMINAL -->
  <g transform="translate(18, 98)">
    <rect width="175" height="120" rx="4" fill="rgba(0,0,0,0.6)" stroke="rgba(196,0,255,0.35)" stroke-width="1"/>
    <rect width="175" height="14" rx="4" fill="rgba(196,0,255,0.12)"/>
    <circle cx="8"  cy="7" r="3.5" fill="#FF5F57" opacity="0.8"/>
    <circle cx="18" cy="7" r="3.5" fill="#FEBC2E" opacity="0.8"/>
    <circle cx="28" cy="7" r="3.5" fill="#28C840" opacity="0.8"/>
    <text x="88" y="10" font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(196,0,255,0.5)" text-anchor="middle">shell</text>

    <text x="8" y="28" font-family="JetBrains Mono,monospace" font-size="7.5" fill="rgba(196,0,255,0.8)">$ init --mode=hacker</text>
    <text x="8" y="41" font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(0,240,255,0.7)">[OK] Java ········ ACTIVE</text>
    <text x="8" y="53" font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(0,240,255,0.7)">[OK] Python ······ ACTIVE</text>
    <text x="8" y="65" font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(0,240,255,0.6)">[OK] HTML/CSS ···· READY</text>
    <text x="8" y="77" font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(255,208,0,0.7)">[..] AI/ML ··· LOADING</text>
    <text x="8" y="89" font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(255,45,120,0.7)">[..] Cyber ··· EXPLORING</text>
    <text x="8" y="105" font-family="JetBrains Mono,monospace" font-size="8" fill="rgba(196,0,255,0.9)">▋</text>
  </g>

  <!-- ══════════════════════════════
       RIGHT PANEL — DATA BARS + CITY
  ══════════════════════════════ -->

  <!-- City skyline silhouette -->
  <g opacity="0.2">
    <rect x="820"  y="190" width="22"  height="130" fill="#C400FF"/>
    <rect x="846"  y="165" width="18"  height="155" fill="#FF2D78"/>
    <rect x="868"  y="180" width="30"  height="140" fill="#C400FF"/>
    <rect x="902"  y="145" width="16"  height="175" fill="#7B00FF"/>
    <rect x="922"  y="158" width="26"  height="162" fill="#C400FF"/>
    <rect x="952"  y="128" width="20"  height="192" fill="#FF2D78"/>
    <rect x="976"  y="148" width="28"  height="172" fill="#C400FF"/>
    <rect x="1008" y="115" width="32"  height="205" fill="#7B00FF"/>
    <rect x="1044" y="140" width="18"  height="180" fill="#FF2D78"/>
    <rect x="1066" y="108" width="36"  height="212" fill="#C400FF"/>
    <rect x="1106" y="135" width="22"  height="185" fill="#FF2D78"/>
    <rect x="1132" y="122" width="28"  height="198" fill="#C400FF"/>
    <rect x="1164" y="155" width="36"  height="165" fill="#7B00FF"/>

    <!-- Antenna spires -->
    <line x1="858"  y1="165" x2="858"  y2="148" stroke="#FF2D78" stroke-width="1.5"/>
    <line x1="962"  y1="128" x2="962"  y2="108" stroke="#C400FF" stroke-width="1.5"/>
    <line x1="1024" y1="115" x2="1024" y2="95"  stroke="#FF2D78" stroke-width="2"/>
    <line x1="1082" y1="108" x2="1082" y2="88"  stroke="#C400FF" stroke-width="1.5"/>

    <!-- Building windows -->
    <rect x="825"  y="195" width="5" height="5" fill="rgba(255,45,120,0.8)"/>
    <rect x="833"  y="195" width="5" height="5" fill="rgba(196,0,255,0.6)"/>
    <rect x="825"  y="205" width="5" height="5" fill="rgba(196,0,255,0.4)"/>
    <rect x="953"  y="135" width="5" height="5" fill="rgba(255,45,120,0.9)"/>
    <rect x="961"  y="135" width="5" height="5" fill="rgba(196,0,255,0.7)"/>
    <rect x="953"  y="145" width="5" height="5" fill="rgba(255,208,0,0.5)"/>
    <rect x="1012" y="122" width="6" height="6" fill="rgba(255,45,120,0.8)"/>
    <rect x="1022" y="122" width="6" height="6" fill="rgba(196,0,255,0.9)"/>
    <rect x="1012" y="132" width="6" height="6" fill="rgba(0,240,255,0.6)"/>
    <rect x="1070" y="115" width="6" height="6" fill="rgba(255,45,120,0.8)"/>
    <rect x="1080" y="115" width="6" height="6" fill="rgba(196,0,255,0.7)"/>
    <rect x="1070" y="128" width="6" height="6" fill="rgba(255,208,0,0.5)"/>
  </g>

  <!-- Horizon glow -->
  <ellipse cx="1010" cy="320" rx="260" ry="55" fill="rgba(196,0,255,0.1)"/>
  <ellipse cx="1010" cy="320" rx="160" ry="35" fill="rgba(255,45,120,0.07)"/>

  <!-- Data visualization bars (right side) -->
  <g transform="translate(1090, 55)" filter="url(#glow-sm)">
    <text x="0" y="0" font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(196,0,255,0.5)">SLIIT · BATCH 2025</text>

    <!-- bar chart -->
    <rect x="0"  y="15" width="6" height="40"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="10" y="20" width="6" height="35"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="20" y="10" width="6" height="45"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="30" y="5"  width="6" height="50"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="40" y="18" width="6" height="37"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="50" y="8"  width="6" height="47"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="60" y="2"  width="6" height="53"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="70" y="12" width="6" height="43"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="80" y="25" width="6" height="30"  fill="rgba(196,0,255,0.15)" rx="1"/>
    <rect x="90" y="0"  width="6" height="55"  fill="rgba(196,0,255,0.15)" rx="1"/>

    <!-- active bars (glow) -->
    <rect x="30" y="5"  width="6" height="50"  fill="rgba(196,0,255,0.7)" rx="1" filter="url(#glow-sm)"/>
    <rect x="60" y="2"  width="6" height="53"  fill="rgba(255,45,120,0.7)" rx="1" filter="url(#glow-sm)"/>
    <rect x="90" y="0"  width="6" height="55"  fill="rgba(196,0,255,0.8)" rx="1" filter="url(#glow-sm)"/>
  </g>

  <!-- RIGHT circuit lines -->
  <g filter="url(#glow-sm)">
    <path d="M 1200 90  L 1130 90  L 1110 110 L 1060 110" stroke="#FF2D78" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M 1200 140 L 1140 140 L 1120 120 L 1080 120" stroke="#C400FF" stroke-width="1"   fill="none" opacity="0.45"/>
    <path d="M 1200 230 L 1150 230 L 1130 210 L 1090 210" stroke="#FF2D78" stroke-width="1"   fill="none" opacity="0.4"/>
    <circle cx="1060" cy="110" r="3.5" fill="#FF2D78" opacity="0.8"/>
    <circle cx="1080" cy="120" r="3"   fill="#C400FF" opacity="0.7"/>
    <circle cx="1090" cy="210" r="3"   fill="#FF2D78" opacity="0.6"/>
    <circle cx="1060" cy="110" r="7" fill="none" stroke="#FF2D78" stroke-width="0.7" opacity="0.4"/>
  </g>

  <!-- ══════════════════════════════
       CENTER — MAIN CONTENT
  ══════════════════════════════ -->

  <!-- Top terminal bar -->
  <rect x="0" y="0" width="1200" height="24" fill="rgba(0,0,0,0.65)"/>
  <circle cx="16" cy="12" r="5" fill="#FF5F57" opacity="0.9"/>
  <circle cx="32" cy="12" r="5" fill="#FEBC2E" opacity="0.9"/>
  <circle cx="48" cy="12" r="5" fill="#28C840" opacity="0.9"/>
  <line x1="64" y1="0" x2="64" y2="24" stroke="rgba(196,0,255,0.2)" stroke-width="1"/>
  <text x="600" y="16" font-family="JetBrains Mono,monospace" font-size="9" fill="rgba(196,0,255,0.55)" text-anchor="middle" letter-spacing="1">dilki@sliit:~ $ ./profile.sh --mode=cyberpunk --status=active</text>

  <!-- MAIN NAME — glow shadow layer -->
  <text x="600" y="148"
    font-family="JetBrains Mono,monospace"
    font-size="62" font-weight="900"
    fill="rgba(196,0,255,0.35)"
    text-anchor="middle"
    letter-spacing="6"
    filter="url(#glow-hard)">DILKI SENANAYAKE</text>

  <!-- MAIN NAME — white layer -->
  <text x="600" y="148"
    font-family="JetBrains Mono,monospace"
    font-size="62" font-weight="900"
    fill="url(#name-grad)"
    text-anchor="middle"
    letter-spacing="6"
    filter="url(#glow-name)">DILKI SENANAYAKE</text>

  <!-- Underline neon -->
  <rect x="240" y="158" width="720" height="1.5" fill="url(#neon-h)" opacity="0.8"/>
  <rect x="320" y="161" width="560" height="0.5" fill="url(#neon-h)" opacity="0.4"/>

  <!-- Accent dots on underline ends -->
  <circle cx="240" cy="159" r="3" fill="#C400FF" filter="url(#glow-sm)" opacity="0.9"/>
  <circle cx="960" cy="159" r="3" fill="#FF2D78" filter="url(#glow-sm)" opacity="0.9"/>

  <!-- TAGLINE -->
  <text x="600" y="184"
    font-family="JetBrains Mono,monospace"
    font-size="13" fill="rgba(220,180,255,0.85)"
    text-anchor="middle" letter-spacing="3">
    IT UNDERGRADUATE  ·  SLIIT SRI LANKA  ·  CYBERSECURITY  ·  AI / ML
  </text>

  <!-- STATUS LINE -->
  <text x="600" y="210"
    font-family="JetBrains Mono,monospace"
    font-size="10.5" fill="rgba(196,0,255,0.55)"
    text-anchor="middle" letter-spacing="2">
    // continuous_learning = true  ·  building real solutions  ·  open to connect
  </text>

  <!-- STATUS PILLS -->
  <g transform="translate(440, 225)">
    <!-- Java pill -->
    <rect x="0"   y="0" width="56"  height="18" rx="9" fill="rgba(237,139,0,0.15)"  stroke="rgba(237,139,0,0.4)"  stroke-width="1"/>
    <text x="28"  y="12" font-family="JetBrains Mono,monospace" font-size="8" fill="rgba(237,139,0,0.9)"  text-anchor="middle">☕ Java</text>

    <!-- Python pill -->
    <rect x="64"  y="0" width="64"  height="18" rx="9" fill="rgba(55,118,171,0.15)" stroke="rgba(55,118,171,0.4)" stroke-width="1"/>
    <text x="96"  y="12" font-family="JetBrains Mono,monospace" font-size="8" fill="rgba(100,180,255,0.9)" text-anchor="middle">🐍 Python</text>

