  <g font-family="JetBrains Mono,monospace" font-size="9" opacity="0.15" fill="#FF2D78">
    <text x="880" y="55">10110100</text>
    <text x="880" y="68">01001011</text>
    <text x="880" y="81">11100010</text>
    <text x="880" y="270">00101101</text>
    <text x="880" y="283">10011010</text>
  </g>

  <!-- Floating code symbols -->
  <g font-family="JetBrains Mono,monospace" opacity="0.22">
    <text x="230" y="110" font-size="14" fill="#C400FF">{ }</text>
    <text x="220" y="250" font-size="14" fill="#FF2D78">&lt;/&gt;</text>
    <text x="870" y="110" font-size="14" fill="#FF2D78">[ ]</text>
    <text x="875" y="250" font-size="14" fill="#C400FF">::</text>
    <text x="550" y="290" font-size="11" fill="#C400FF">=&gt;</text>
    <text x="620" y="290" font-size="11" fill="#FF2D78">&&amp;&amp;</text>
    <text x="680" y="290" font-size="11" fill="#7B00FF">||</text>
  </g>

  <!-- ══════════════════════════════
       CORNER FRAME DECORATIONS
  ══════════════════════════════ -->
  <!-- Top-left -->
  <path d="M 0 24 L 0 55 L 3 55 L 3 27 L 55 27 L 55 24 Z" fill="rgba(196,0,255,0.7)" filter="url(#glow-sm)"/>
  <path d="M 0 24 L 0 45 L 1.5 45 L 1.5 25.5 L 45 25.5 L 45 24 Z" fill="rgba(196,0,255,0.4)"/>

  <!-- Top-right -->
  <path d="M 1200 24 L 1200 55 L 1197 55 L 1197 27 L 1145 27 L 1145 24 Z" fill="rgba(255,45,120,0.7)" filter="url(#glow-sm)"/>
  <path d="M 1200 24 L 1200 45 L 1198.5 45 L 1198.5 25.5 L 1155 25.5 L 1155 24 Z" fill="rgba(255,45,120,0.4)"/>

