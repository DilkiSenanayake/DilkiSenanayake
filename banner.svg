  <path d="M 1200 320 L 1200 299 L 1198.5 299 L 1198.5 318.5 L 1155 318.5 L 1155 320 Z" fill="rgba(196,0,255,0.4)"/>

  <!-- Horizontal frame lines -->
  <line x1="55" y1="25.5" x2="210" y2="25.5" stroke="rgba(196,0,255,0.3)" stroke-width="0.8"/>
  <line x1="990" y1="25.5" x2="1145" y2="25.5" stroke="rgba(255,45,120,0.3)" stroke-width="0.8"/>
  <line x1="55" y1="318.5" x2="210" y2="318.5" stroke="rgba(255,45,120,0.3)" stroke-width="0.8"/>
  <line x1="990" y1="318.5" x2="1145" y2="318.5" stroke="rgba(196,0,255,0.3)" stroke-width="0.8"/>

  <!-- Bottom border glow -->
